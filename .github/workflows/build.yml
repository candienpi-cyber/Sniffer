name: Build APK

# Se déclenche à chaque push sur main, et manuellement depuis l'onglet Actions
on:
  push:
    branches: [ "main" ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer le JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Installer le SDK Android
        uses: android-actions/setup-android@v3

      - name: Installer et configurer Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Compiler l'APK debug
        run: gradle assembleDebug --stacktrace

      - name: Publier l'APK en tant qu'artefact téléchargeable
        uses: actions/upload-artifact@v4
        with:
          name: StalkerPlayer-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk
